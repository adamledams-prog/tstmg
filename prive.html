<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Espace privé</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: Arial, sans-serif;
      background: radial-gradient(circle at top, #2f3b52, #111827);
      color: white;
      animation: fadeIn 0.5s ease;
    }

    .box {
      padding: 26px 30px;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.2);
      backdrop-filter: blur(3px);
      text-align: center;
      animation: slideUp 0.4s ease;
    }

    h1 {
      margin: 0 0 8px 0;
      font-size: 32px;
    }

    p {
      margin: 0;
      opacity: 0.9;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>Espace privé</h1>
    <p>Accès autorisé.</p>
  </div>
</body>
</html>
