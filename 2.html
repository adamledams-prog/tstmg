<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Classe TSTMG2</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: Arial, sans-serif;
      background: linear-gradient(160deg, #eef4ff, #ffffff);
      animation: fadeIn 0.45s ease;
    }

    h1 {
      margin: 0;
      padding: 20px 28px;
      border-radius: 14px;
      background: #ffffff;
      color: #1e3a8a;
      box-shadow: 0 8px 24px rgba(30, 58, 138, 0.12);
      animation: slideUp 0.4s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>
<body>
  <h1>TSTMG2</h1>
</body>
</html>
